<!DOCTYPE html>
<html lang="zh-cn">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover" name="viewport" />
  <title>LANService</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="img/service-icon-apple.png">
  <meta name="application-name" content="LANService" />
  <meta name="apple-mobile-web-app-title" content="LANService">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="shortcut icon" href="favicon.png" type="image/x-icon">
  <link rel="stylesheet" href="./css/font-awesome.css">
  <link rel="stylesheet" href="./css/index.css">
  <script>
    if (navigator.serviceWorker != null) {
      navigator.serviceWorker.register('sw.js')
      .then(function(registration) {
        console.log('Registered events at scope: ', registration.scope);
      });
    }
  </script>
  <script src="./js/lib/vue.js"></script>
</head>

<body>
  <div id="app">
    <!-- 连接状态指示器 -->
    <div class="status-bar" :class="{ connected: connected, disconnected: !connected }">
      <span class="status-dot"></span>
      <span class="status-text">{{ statusText }}</span>
      <span class="status-resolution" v-if="connected && screenInfo.screenWidth">{{ screenInfo.screenWidth }}×{{ screenInfo.screenHeight }}</span>
    </div>

    <!-- 视频区域 -->
    <div class="video-container" ref="videoContainer">
      <!-- 视频元素 -->
      <video
        ref="video"
        class="video-stream"
        autoplay
        playsinline
        muted
        @loadedmetadata="onVideoReady"
      ></video>

      <!-- 触摸面板（覆盖在视频上） -->
      <div
        class="touch-panel"
        ref="touchPanel"
        v-show="connected"
        @touchstart="onTouchStart"
        @touchmove="onTouchMove"
        @touchend="onTouchEnd"
      >
        <!-- 触摸模式指示器 -->
        <div class="touch-mode-indicator" v-if="showModeIndicator" :class="'mode-' + touchMode">
          {{ touchMode === 'pointer' ? '🖱️' : '📜' }}
        </div>
      </div>

      <!-- 未连接时的占位 -->
      <div class="placeholder" v-if="!connected">
        <div class="placeholder-icon">
          <div class="spinner"></div>
        </div>
        <div class="placeholder-text">正在连接...</div>
        <button class="btn-reconnect" @click="reconnect" v-if="!connecting">
          <i class="fa fa-refresh"></i> 重新连接
        </button>
      </div>
    </div>

    <!-- 底部工具栏 -->
    <div class="toolbar" v-show="connected">
      <!-- 第一行：常用操作 -->
      <div class="toolbar-row">
        <button class="tool-btn" @click="call('system/shortcut', {keys: ['d', 'command']})" title="显示桌面">
          <i class="fa fa-desktop"></i>
        </button>
        <button class="tool-btn" @click="call('system/shortcut', {keys: ['tab', 'alt']})" title="切换窗口">
          <i class="fa fa-exchange"></i>
        </button>
        <button class="tool-btn" :class="{ active: touchMode === 'pointer' }" @click="switchTouchMode('pointer')" title="鼠标模式">
          <i class="fa fa-mouse-pointer"></i>
        </button>
        <button class="tool-btn" :class="{ active: touchMode === 'scroll' }" @click="switchTouchMode('scroll')" title="滚动模式">
          <i class="fa fa-arrows"></i>
        </button>
        <button class="tool-btn" @click="quickLeftClick" title="左键单击">
          <i class="fa fa-hand-o-up"></i>
        </button>
        <button class="tool-btn" @click="quickRightClick" title="右键单击">
          <i class="fa fa-hand-pointer-o"></i>
        </button>
        <button class="tool-btn" @click="call('system/lock')" title="锁屏">
          <i class="fa fa-lock"></i>
        </button>
      </div>

      <!-- 第二行：媒体控制 -->
      <div class="toolbar-row">
        <button class="tool-btn" @click="call('media/prev')" title="上一首">
          <i class="fa fa-step-backward"></i>
        </button>
        <button class="tool-btn" @click="call('media/pause')" title="播放/暂停">
          <i class="fa fa-play"></i>
        </button>
        <button class="tool-btn" @click="call('media/stop')" title="停止">
          <i class="fa fa-stop"></i>
        </button>
        <button class="tool-btn" @click="call('media/next')" title="下一首">
          <i class="fa fa-step-forward"></i>
        </button>
        <button class="tool-btn" @click="toggleMute" title="静音切换">
          <i class="fa" :class="systemVolumn.mute ? 'fa-volume-off' : 'fa-volume-up'"></i>
        </button>
        <button class="tool-btn" @click="call('media/volumeDown')" title="音量-">
          <i class="fa fa-volume-down"></i>
        </button>
        <button class="tool-btn" @click="call('media/volumeUp')" title="音量+">
          <i class="fa fa-volume-up"></i>
        </button>
        <button class="tool-btn tool-btn-danger" @click="dangerCall('system/poweroff')" title="关机">
          <i class="fa fa-power-off"></i>
        </button>
      </div>
    </div>

    <!-- 音量信息（轻提示） -->
    <div class="volume-toast" v-if="showVolumeToast">
      <i class="fa" :class="systemVolumn.mute ? 'fa-volume-off' : 'fa-volume-up'"></i>
      <span>{{ systemVolumn.mute ? '静音' : systemVolumn.volume }}</span>
    </div>
  </div>

  <script src="./js/ws-api.js"></script>
  <script src="./js/webrtc-client.js"></script>
  <script src="./js/index.js"></script>
</body>
</html>
